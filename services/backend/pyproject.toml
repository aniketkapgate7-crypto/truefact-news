[tool.ruff]
target-version = "py311"
line-length = 88
extend-exclude = ["alembic/versions"]

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "I"]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401"]
"alembic/env.py" = ["F401"]
"tests/conftest.py" = ["F401"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
